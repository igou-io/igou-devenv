# tmux config for the igou-devenv devcontainer. Copied to ~/.tmux.conf by
# post-create.sh. The plugins (tmux-resurrect + tmux-continuum) are baked into
# the image at /opt/tmux-plugins (see .devcontainer/Dockerfile) and loaded
# directly — no TPM, no runtime network fetch.
#
# Persistence: continuum auto-saves the environment every 15 min and auto-restores
# it when the tmux server starts. @resurrect-dir lives on the
# ~/.local/share/igou-devenv bind mount, so the window/pane layout survives
# `make rebuild`. (Interactive code-server shells auto-attach to session `main`
# via dotfiles/.bashrc; open extra terminals as tmux windows with `Ctrl-b c`.)
set -g @resurrect-dir '/home/igou/.local/share/igou-devenv/tmux-resurrect'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Quality-of-life
set -g default-terminal 'screen-256color'
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g aggressive-resize on

# Load the baked plugins (resurrect must load before continuum).
run-shell /opt/tmux-plugins/tmux-resurrect/resurrect.tmux
run-shell /opt/tmux-plugins/tmux-continuum/continuum.tmux
