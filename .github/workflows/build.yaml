name: Build devcontainer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: |
            echo "==> Verifying tools..."
            kubectl version --client
            helm version --short
            terraform version
            go version
            gh --version
            python3 --version
            node --version
            claude --version
            ansible --version
            argocd version --client --short
            kustomize version
            kubeseal --version
            flux --version
            sops --version
            virtctl version --client
            podman --version
            buildah --version
            skopeo --version
