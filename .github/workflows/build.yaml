name: Build devcontainer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: ${{ github.event_name != 'pull_request' && 'always' || 'never' }}
          imageName: ghcr.io/igou-io/igou-devenv
          runCmd: /workspace/igou-devenv/tests/run-all.sh

      - name: Generate devcontainer SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/igou-io/igou-devenv
          artifact-name: devcontainer-sbom
          output-file: devcontainer.spdx.json
          format: spdx-json
          dependency-snapshot: true

      - name: Build base agent image
        run: docker build -t agent-base -f containers/base/Containerfile containers/base/

      - name: Build Claude container
        run: docker build -t claude-devenv -f containers/claude-code/Containerfile containers/claude-code/

      - name: Generate Claude container SBOM
        uses: anchore/sbom-action@v0
        with:
          image: claude-devenv
          artifact-name: claude-devenv-sbom
          output-file: claude-devenv.spdx.json
          format: spdx-json
          dependency-snapshot: true

      - name: Build Cursor agent container
        run: docker build -t cursor-agent -f containers/cursor-agent-cli/Containerfile containers/cursor-agent-cli/

      - name: Generate Cursor agent container SBOM
        uses: anchore/sbom-action@v0
        with:
          image: cursor-agent
          artifact-name: cursor-agent-sbom
          output-file: cursor-agent.spdx.json
          format: spdx-json
          dependency-snapshot: true
