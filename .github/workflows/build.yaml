name: Build devcontainer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and test devcontainer
        uses: devcontainers/ci@v0.3
        with:
          push: never
          imageName: igou-devenv
          runCmd: /workspace/igou-devenv/tests/run-all.sh

      - name: Generate devcontainer SBOM
        uses: anchore/sbom-action@v0
        with:
          image: igou-devenv
          artifact-name: devcontainer-sbom
          output-file: devcontainer.spdx.json
          format: spdx-json
          dependency-snapshot: true

      - name: Build Claude container
        run: docker build -t claude-devenv -f claude-container/Containerfile claude-container/

      - name: Generate Claude container SBOM
        uses: anchore/sbom-action@v0
        with:
          image: claude-devenv
          artifact-name: claude-devenv-sbom
          output-file: claude-devenv.spdx.json
          format: spdx-json
          dependency-snapshot: true
