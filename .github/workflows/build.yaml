name: Build devcontainer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        # Direct docker CLI login instead of docker/login-action because
        # codeload.github.com is consistently failing to serve that action's
        # tarball ("An action could not be found at the URI ..."), affecting
        # both v4.1.0 and v4.2.0 digests. This bypasses codeload entirely.
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and test devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          push: ${{ github.event_name != 'pull_request' && 'always' || 'never' }}
          imageName: ghcr.io/igou-io/igou-devenv
          runCmd: /workspace/igou-devenv/tests/run-all.sh

      - name: Generate devcontainer SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/igou-io/igou-devenv
          artifact-name: devcontainer-sbom
          output-file: devcontainer.spdx.json
          format: spdx-json
          # Keep the SBOM as a workflow artifact, but do NOT submit it to the
          # GitHub dependency graph. The image bundles many third-party Go/npm
          # CLIs (podman, buildah, kubectl, argocd, code-server, ...); submitting
          # their embedded module SBOMs floods Dependabot with hundreds of CVE
          # alerts for upstream binaries we don't build and can't patch here.
          # Those are remediated by tool-version bumps via Renovate + mise.toml,
          # not by this repo, so the alerts are non-actionable noise that buries
          # any real signal. See git history / PR for the investigation.
          dependency-snapshot: false
